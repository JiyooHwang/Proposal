<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>기획서 / 제안서 자동 생성기</title>
<style>
  :root {
    --primary: #2c5aa0;
    --primary-dark: #1e3f73;
    --bg: #f5f6fa;
    --panel: #ffffff;
    --border: #e1e4eb;
    --text: #1f2937;
    --muted: #6b7280;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    background: var(--primary);
    color: #fff;
    padding: 14px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  }
  header h1 { font-size: 18px; margin: 0; font-weight: 600; }
  .actions { display: flex; gap: 8px; }
  button {
    background: #fff;
    color: var(--primary);
    border: none;
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
    font-weight: 500;
    transition: all 0.15s;
  }
  button:hover { background: #eef3fb; }
  button.ghost {
    background: transparent;
    color: #fff;
    border: 1px solid rgba(255,255,255,0.5);
  }
  button.ghost:hover { background: rgba(255,255,255,0.1); }

  .layout {
    display: grid;
    grid-template-columns: 420px 1fr;
    gap: 16px;
    padding: 16px;
    height: calc(100vh - 60px);
  }
  .form-panel, .preview-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow-y: auto;
  }
  .form-panel { padding: 20px; }
  .preview-panel { padding: 0; }

  .field-group {
    margin-bottom: 18px;
  }
  .field-group h3 {
    font-size: 13px;
    color: var(--primary-dark);
    margin: 0 0 10px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--primary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  label {
    display: block;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 4px;
    font-weight: 500;
  }
  input, textarea, select {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 5px;
    font-size: 14px;
    font-family: inherit;
    margin-bottom: 10px;
    background: #fafbfc;
    color: var(--text);
  }
  input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: var(--primary);
    background: #fff;
  }
  textarea { resize: vertical; min-height: 70px; }
  .hint {
    font-size: 11px;
    color: var(--muted);
    margin-top: -6px;
    margin-bottom: 10px;
  }

  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* Section toggle cards */
  .section-card {
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .section-card.disabled { opacity: 0.55; }
  .section-card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    background: #f3f6fb;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }
  .section-card.disabled .section-card-head { background: #f7f7f9; border-bottom: none; }
  .section-card-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--primary-dark);
    user-select: text;
    -webkit-user-select: text;
    outline: none;
    padding: 2px 6px;
    border-radius: 4px;
    transition: background 0.15s;
    min-width: 60px;
  }
  .section-card-title:hover { background: #e3ebf7; }
  .section-card-title:focus { background: #fff8d8; box-shadow: 0 0 0 2px rgba(44,90,160,0.25); }
  .section-card-head { cursor: default; }
  .section-card-actions { display: flex; gap: 6px; align-items: center; }
  .mini-btn {
    background: #fff;
    color: var(--primary);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
    font-weight: 500;
  }
  .mini-btn:hover { background: #eef3fb; }
  .mini-btn.danger { color: #b3261e; }
  .mini-btn.danger:hover { background: #fdecea; }
  .section-card-body { padding: 12px; }
  .section-card.collapsed .section-card-body { display: none; }
  .subsection-label {
    font-size: 12px;
    color: var(--primary);
    font-weight: 600;
    margin: 6px 0 4px;
  }
  .excluded-host {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    min-height: 12px;
  }
  .excluded-host:empty::after {
    content: '제외된 항목이 없습니다';
    color: var(--muted);
    font-size: 12px;
    font-style: italic;
  }
  .chip-add {
    background: #fff;
    border: 1px dashed var(--primary);
    color: var(--primary);
    padding: 4px 10px;
    border-radius: 14px;
    font-size: 12px;
    cursor: pointer;
  }
  .chip-add:hover { background: #eef3fb; }

  /* Logo uploader */
  .logo-uploader {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 10px;
  }
  .logo-preview {
    width: 90px;
    height: 60px;
    border: 1px dashed var(--border);
    border-radius: 5px;
    background: #fafbfc;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
  }
  .logo-preview.empty { color: var(--muted); font-size: 11px; font-style: italic; }
  .logo-preview img {
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    object-fit: contain;
    image-rendering: -webkit-optimize-contrast;
  }
  .logo-buttons { display: flex; flex-direction: column; gap: 6px; }

  /* Document logo */
  .doc-logo {
    margin-bottom: 16px;
    display: flex;
  }
  .doc-logo.pos-left { justify-content: flex-start; }
  .doc-logo.pos-center { justify-content: center; }
  .doc-logo.pos-right { justify-content: flex-end; }
  .doc-logo img {
    max-width: 100%;
    height: auto;
    object-fit: contain;
    image-rendering: -webkit-optimize-contrast;
    image-rendering: crisp-edges;
  }
  .doc-logo.size-small img { max-height: 40px; }
  .doc-logo.size-medium img { max-height: 70px; }
  .doc-logo.size-large img { max-height: 110px; }

  /* AI panel */
  .ai-panel {
    background: linear-gradient(135deg, #f4f1ff 0%, #eef3fb 100%);
    border: 1px solid #d9d0fa;
    border-radius: 8px;
    padding: 14px 16px;
  }
  .ai-panel h3 {
    border-bottom-color: #6c4dd6 !important;
    color: #4a2fb5 !important;
  }
  .hint-inline { font-size: 11px; color: var(--muted); font-weight: 400; }
  .ai-run-btn {
    width: 100%;
    background: #6c4dd6;
    color: #fff;
    padding: 10px;
    font-weight: 600;
    border-radius: 6px;
    margin: 4px 0 6px;
  }
  .ai-run-btn:hover { background: #5839c2; }
  .ai-run-btn:disabled { background: #b9adea; cursor: wait; }
  .ai-status {
    font-size: 12px;
    min-height: 16px;
    margin: 4px 0;
  }
  .ai-status.error { color: #b3261e; }
  .ai-status.success { color: #1b7a3a; }
  .ai-status.loading { color: #4a2fb5; }

  /* Document preview */
  .doc {
    max-width: 800px;
    margin: 30px auto;
    padding: 60px 70px;
    background: #fff;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    line-height: 1.7;
    font-size: 14px;
    color: #222;
  }
  .doc-header {
    text-align: center;
    border-bottom: 3px double var(--primary);
    padding-bottom: 24px;
    margin-bottom: 32px;
  }
  .doc-type {
    font-size: 13px;
    color: var(--primary);
    letter-spacing: 4px;
    margin-bottom: 10px;
    font-weight: 600;
  }
  .doc-title {
    font-size: 26px;
    font-weight: 700;
    color: #111;
    margin: 0 0 18px;
    line-height: 1.4;
  }
  .doc-meta {
    display: flex;
    justify-content: center;
    gap: 30px;
    font-size: 13px;
    color: var(--muted);
  }
  .doc-meta span strong { color: #333; margin-right: 4px; }

  .doc h2 {
    font-size: 17px;
    color: var(--primary-dark);
    border-left: 4px solid var(--primary);
    padding-left: 10px;
    margin: 28px 0 14px;
  }
  .doc .sub-h {
    font-size: 14px;
    color: #333;
    margin: 16px 0 6px;
    font-weight: 600;
  }
  /* 미리보기 인라인 편집 스타일 */
  .doc [contenteditable="true"] {
    outline: none;
    border-radius: 3px;
    transition: background-color 0.15s;
    min-height: 1em;
  }
  .doc [contenteditable="true"]:hover {
    background: #f4f7fc;
  }
  .doc [contenteditable="true"]:focus {
    background: #fff8d8;
    box-shadow: 0 0 0 2px rgba(44, 90, 160, 0.25);
  }
  .doc .ed-empty.ed-text::before,
  .doc .ed-list.ed-empty li:empty::before {
    content: '클릭하여 입력...';
    color: #c8c8c8;
    font-style: italic;
  }
  .doc .doc-title.ed-empty::before { content: '제목을 입력하세요'; }
  .doc .ed-list { list-style: disc; }
  .doc .num {
    user-select: none;
    -webkit-user-select: none;
    color: inherit;
    margin-right: 4px;
  }
  .doc h2 [contenteditable="true"],
  .doc .sub-h [contenteditable="true"],
  .doc th [contenteditable="true"] {
    display: inline-block;
    min-width: 40px;
  }

  /* 인쇄 시 편집 강조 제거 */
  @media print {
    .doc [contenteditable="true"]:hover,
    .doc [contenteditable="true"]:focus {
      background: transparent !important;
      box-shadow: none !important;
    }
    .doc .ed-empty::before { content: '' !important; }
  }
  .doc p { margin: 0 0 12px; white-space: pre-wrap; }
  .doc ul { margin: 0 0 12px; padding-left: 22px; }
  .doc ul li { margin-bottom: 4px; }

  .doc table {
    width: 100%;
    border-collapse: collapse;
    margin: 12px 0;
    font-size: 13px;
  }
  .doc th, .doc td {
    border: 1px solid #d0d4dc;
    padding: 8px 12px;
    text-align: left;
  }
  .doc th {
    background: #eef3fb;
    color: var(--primary-dark);
    font-weight: 600;
    width: 30%;
  }
  .empty {
    color: #aaa;
    font-style: italic;
  }
  .doc-footer {
    margin-top: 50px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    border-top: 1px solid var(--border);
    padding-top: 16px;
  }

  /* ===== 테마: 모던 (다크 네이비 + 머스타드 베이지) ===== */
  .doc.theme-modern {
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
    color: #1f2937;
    padding: 0;
    overflow: hidden;
    background: #fff;
  }
  .doc.theme-modern .doc-logo {
    background: #1d2733;
    padding: 32px 60px 0 100px;
    margin-bottom: 0;
    position: relative;
  }
  .doc.theme-modern .doc-logo::before,
  .doc.theme-modern .doc-header::before,
  .doc.theme-modern .doc-footer::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 60px;
    background: #c2a577;
  }
  .doc.theme-modern .doc-logo img { filter: brightness(0) invert(1); }
  .doc.theme-modern .doc-header {
    background: #1d2733;
    color: #fff;
    padding: 60px 60px 70px 100px;
    margin: 0 0 0;
    border: none;
    text-align: left;
    position: relative;
  }
  .doc.theme-modern .doc-type {
    color: #c2a577;
    letter-spacing: 5px;
    font-size: 11px;
    font-weight: 600;
    margin-bottom: 18px;
    text-transform: uppercase;
  }
  .doc.theme-modern .doc-title {
    color: #fff;
    font-size: 44px;
    font-weight: 800;
    line-height: 1.1;
    margin-bottom: 12px;
    letter-spacing: -0.5px;
  }
  .doc.theme-modern .doc-meta {
    margin-top: 28px;
    justify-content: flex-start;
    gap: 28px;
    color: #c2a577;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .doc.theme-modern .doc-meta strong {
    color: rgba(255,255,255,0.6);
    font-weight: 500;
    margin-right: 6px;
  }
  .doc.theme-modern .doc-meta strong + span,
  .doc.theme-modern .doc-meta > span > span:not([class*="ed-"]):last-child { color: #fff; font-weight: 600; }

  .doc.theme-modern h2 {
    font-size: 22px;
    color: #1d2733;
    border: none;
    padding: 0 60px 0 100px;
    margin: 48px 0 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .doc.theme-modern h2 .num {
    background: #c2a577;
    color: #1d2733;
    padding: 4px 10px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    border-radius: 0;
    margin-right: 4px;
  }
  .doc.theme-modern .sub-h {
    padding: 0 60px 0 100px;
    color: #1d2733;
    font-size: 14px;
    margin: 22px 0 8px;
    font-weight: 700;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .doc.theme-modern .sub-h::before {
    content: '';
    display: inline-block;
    width: 24px; height: 2px;
    background: #c2a577;
  }
  .doc.theme-modern p,
  .doc.theme-modern ul {
    margin-left: 100px;
    margin-right: 60px;
    color: #2c3540;
  }
  .doc.theme-modern ul li::marker { color: #c2a577; }
  .doc.theme-modern table {
    margin-left: 100px;
    margin-right: 60px;
    width: calc(100% - 160px);
    border: none;
  }
  .doc.theme-modern th {
    background: #1d2733;
    color: #fff;
    border: none;
    font-weight: 600;
    padding: 10px 14px;
    letter-spacing: 0.3px;
  }
  .doc.theme-modern td {
    border: none;
    border-bottom: 1px solid #ece6da;
    background: #faf7f1;
    padding: 10px 14px;
    color: #2c3540;
  }
  .doc.theme-modern tr:nth-child(even) td { background: #f3eddd; }
  .doc.theme-modern .doc-footer {
    margin: 64px 0 0;
    background: #1d2733;
    color: #c2a577;
    padding: 18px 60px 18px 100px;
    border: none;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: left;
    position: relative;
  }

  /* ===== 테마: 미니멀 ===== */
  .doc.theme-minimal {
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
    color: #2a2a2a;
    padding: 80px 90px;
    line-height: 1.85;
  }
  .doc.theme-minimal .doc-logo { margin-bottom: 32px; }
  .doc.theme-minimal .doc-header {
    border: none;
    border-bottom: 1px solid #d0d0d0;
    padding-bottom: 36px;
    margin-bottom: 48px;
    text-align: left;
  }
  .doc.theme-minimal .doc-type {
    color: #888;
    letter-spacing: 3px;
    font-size: 11px;
    margin-bottom: 8px;
    font-weight: 400;
  }
  .doc.theme-minimal .doc-title {
    color: #1a1a1a;
    font-size: 30px;
    font-weight: 300;
    letter-spacing: -0.5px;
    margin-bottom: 18px;
  }
  .doc.theme-minimal .doc-meta {
    justify-content: flex-start;
    gap: 24px;
    color: #777;
    font-size: 12px;
  }
  .doc.theme-minimal .doc-meta strong { color: #1a1a1a; font-weight: 500; }
  .doc.theme-minimal h2 {
    border: none;
    padding: 0;
    color: #1a1a1a;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin: 44px 0 16px;
    border-bottom: 2px solid #1a1a1a;
    padding-bottom: 8px;
    display: inline-block;
    min-width: 200px;
  }
  .doc.theme-minimal h2 .num {
    color: #b0b0b0;
    font-weight: 400;
    margin-right: 8px;
  }
  .doc.theme-minimal .sub-h {
    color: #555;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    margin-top: 18px;
  }
  .doc.theme-minimal th {
    background: transparent;
    color: #555;
    border: none;
    border-bottom: 1px solid #e5e5e5;
    font-weight: 500;
    padding: 10px 8px;
    width: 25%;
  }
  .doc.theme-minimal td {
    border: none;
    border-bottom: 1px solid #f0f0f0;
    padding: 10px 8px;
  }
  .doc.theme-minimal .doc-footer {
    margin-top: 64px;
    border-top: 1px solid #e5e5e5;
    padding-top: 18px;
    color: #999;
    text-align: left;
    font-size: 11px;
    letter-spacing: 1px;
  }

  /* Print */
  @media print {
    header, .form-panel { display: none !important; }
    .layout { display: block; height: auto; padding: 0; gap: 0; }
    .preview-panel { border: none; overflow: visible; }
    .doc {
      box-shadow: none;
      margin: 0;
      max-width: 100%;
      padding: 20mm;
    }
    @page { size: A4; margin: 0; }
  }

  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; height: auto; }
    .preview-panel { min-height: 600px; }
  }
</style>
</head>
<body>

<header>
  <h1>📋 기획서 / 제안서 자동 생성기</h1>
  <div class="actions">
    <button class="ghost" onclick="loadSample()">샘플 채우기</button>
    <button class="ghost" onclick="resetForm()">초기화</button>
    <button onclick="exportJSON()">저장(JSON)</button>
    <button onclick="document.getElementById('importFile').click()">불러오기</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)" />
    <button onclick="exportWord()">Word(.doc)</button>
    <button onclick="exportPPT()">PPT(.pptx)</button>
    <button onclick="window.print()">PDF/인쇄</button>
  </div>
</header>

<div class="layout">
  <!-- Form -->
  <div class="form-panel">
    <div class="field-group ai-panel">
      <h3>🤖 AI 자동 작성 (Gemini)</h3>
      <label>Gemini API 키 <span class="hint-inline">(본인 키, 브라우저에만 저장)</span></label>
      <input id="aiApiKey" type="password" placeholder="AIza..." autocomplete="off" />
      <div class="row">
        <div>
          <label>모델</label>
          <select id="aiModel">
            <option value="gemini-2.5-flash">gemini-2.5-flash (빠름·저비용)</option>
            <option value="gemini-2.5-pro">gemini-2.5-pro (고품질)</option>
            <option value="gemini-2.0-flash">gemini-2.0-flash</option>
          </select>
        </div>
        <div>
          <label>적용 범위</label>
          <select id="aiScope">
            <option value="empty">빈 항목만 채우기</option>
            <option value="all">전체 덮어쓰기</option>
          </select>
        </div>
      </div>
      <label>주제·키워드 (자유 서술 가능)</label>
      <textarea id="aiKeywords" placeholder="예: 스마트시티 통합관제 플랫폼, AI 영상분석, 공공기관 대상, 12개월 사업, 예산 8억" rows="3"></textarea>
      <button id="aiRunBtn" class="ai-run-btn" onclick="runAI()">AI로 자동 작성</button>
      <div id="aiStatus" class="ai-status"></div>
      <p class="hint">API 키 발급: aistudio.google.com/apikey · 키는 이 브라우저(localStorage)에만 저장되며 외부 서버로 전송되지 않습니다.</p>
    </div>

    <div class="field-group">
      <h3>문서 기본 정보</h3>
      <label>문서 종류</label>
      <select id="docType">
        <option value="제안서">제안서</option>
        <option value="기획서">기획서</option>
        <option value="사업계획서">사업계획서</option>
        <option value="프로젝트 계획서">프로젝트 계획서</option>
      </select>
      <label>제목</label>
      <input id="title" placeholder="예: 신규 모바일 앱 출시 기획" oninput="render()" />
      <div class="row">
        <div>
          <label>작성자</label>
          <input id="author" placeholder="홍길동" oninput="render()" />
        </div>
        <div>
          <label>소속/부서</label>
          <input id="org" placeholder="기획팀" oninput="render()" />
        </div>
      </div>
      <label>작성일</label>
      <input id="date" type="date" oninput="render()" />

      <label>디자인 테마</label>
      <select id="docTheme" onchange="onThemeChange()">
        <option value="classic">클래식 (기본·격식)</option>
        <option value="modern">모던 (강조·트렌디)</option>
        <option value="minimal">미니멀 (여백·절제)</option>
      </select>

      <label>회사 로고 <span class="hint-inline">(PNG·JPG·SVG, 자동 비율 유지)</span></label>
      <div class="logo-uploader">
        <div id="logoPreview" class="logo-preview empty">로고 없음</div>
        <div class="logo-buttons">
          <input type="file" id="logoFile" accept="image/*" style="display:none" onchange="onLogoUpload(event)" />
          <button type="button" class="mini-btn" onclick="document.getElementById('logoFile').click()">로고 업로드</button>
          <button type="button" class="mini-btn danger" onclick="removeLogo()">제거</button>
        </div>
      </div>
      <div class="row">
        <div>
          <label>로고 위치</label>
          <select id="logoPosition" onchange="onLogoOptionChange()">
            <option value="center">상단 중앙</option>
            <option value="left">상단 왼쪽</option>
            <option value="right">상단 오른쪽</option>
          </select>
        </div>
        <div>
          <label>로고 크기</label>
          <select id="logoSize" onchange="onLogoOptionChange()">
            <option value="small">작게</option>
            <option value="medium" selected>보통</option>
            <option value="large">크게</option>
          </select>
        </div>
      </div>
    </div>

    <div class="field-group">
      <h3>제외된 항목 (클릭하여 추가)</h3>
      <div id="excludedHost" class="excluded-host"></div>
    </div>

    <div id="sectionsHost"></div>
  </div>

  <!-- Preview -->
  <div class="preview-panel">
    <div class="doc" id="doc"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<script>
const $ = (id) => document.getElementById(id);
const STORAGE_KEY = 'proposal-tool-data-v2';

// 헤더 기본 정보 필드
const HEADER_FIELDS = ['docType','title','author','org','date'];

// 섹션 스키마: 각 섹션은 enabled 토글 가능, children = 하위 항목, fields = 표 입력
// title이 객체면 docType별 라벨 분기 ({ 제안서: '...', 기획서: '...', default: '...' })
const SCHEMA = [
  {
    id: 'overview',
    title: { 제안서: '제안 개요', 기획서: '기획 개요', default: '제안 개요' },
    children: [
      { id: 'ov_purpose',  label: { 제안서: '제안 목적', 기획서: '기획 목적', default: '제안 목적' }, type: 'textarea' },
      { id: 'ov_features', label: '제안(기획)의 특징 및 장점', type: 'textarea' },
      { id: 'ov_effects',  label: '기대 효과', type: 'textarea' }
    ]
  },
  { id: 'mainContent', title: '주요 내용', single: { id: 'mainContent_text', type: 'textarea', placeholder: '주요 내용을 한 줄에 하나씩 입력' } },
  {
    id: 'budget', title: '소요 예산',
    children: [
      { id: 'bg_total',  label: '총 예산', type: 'input', placeholder: '예: 50,000,000원' },
      { id: 'bg_detail', label: '세부 내역 (한 줄에 하나)', type: 'textarea', placeholder: '인건비: 30,000,000원\n장비: 15,000,000원' }
    ]
  },
  {
    id: 'company',
    title: { 제안서: '자사 현황', 기획서: '업체 현황', default: '자사 현황' },
    table: [
      { id: 'co_name',     label: '회사명' },
      { id: 'co_ceo',      label: '대표자' },
      { id: 'co_business', label: '사업분야' },
      { id: 'co_address',  label: '주소' },
      { id: 'co_phone',    label: '전화번호' },
      { id: 'co_founded',  label: '회사 설립 연도' },
      { id: 'co_career',   label: '해당부문 종사 기간' },
      { id: 'co_history',  label: '주요 연혁', type: 'textarea', placeholder: '연도/사건 형식으로 한 줄에 하나' }
    ]
  },
  {
    id: 'execution', title: '수행 계획 및 능력',
    children: [
      { id: 'ex_plan',       label: '수행 계획', type: 'textarea' },
      { id: 'ex_detail',     label: '세부 수행 계획', type: 'textarea' },
      { id: 'ex_experience', label: '과거 수행 경험', type: 'textarea' }
    ]
  },
  {
    id: 'management', title: '사업 관리',
    children: [
      { id: 'mg_org',      label: '사업 수행 조직', type: 'textarea' },
      { id: 'mg_manpower', label: '투입 인력 계획', type: 'textarea' },
      { id: 'mg_schedule', label: '추진 일정 계획', type: 'textarea', placeholder: '1단계 기획: 2026.05~2026.06' }
    ]
  },
  { id: 'etc', title: '기타', single: { id: 'etc_text', type: 'textarea' } }
];

// 모든 입력 id 수집
function allInputIds() {
  const ids = [...HEADER_FIELDS];
  SCHEMA.forEach(s => {
    if (s.children) s.children.forEach(c => ids.push(c.id));
    if (s.single) ids.push(s.single.id);
    if (s.table) s.table.forEach(f => ids.push(f.id));
  });
  return ids;
}

// 상태: 입력값 + 섹션 enabled 여부
const state = {
  values: {},
  enabled: Object.fromEntries(SCHEMA.map(s => [s.id, s.id !== 'etc'])),
  titles: {}  // 사용자가 수정한 섹션/하위/표 제목 오버라이드 (key = id, value = string)
};

function pickTitle(t, docType) {
  if (typeof t === 'string') return t;
  return t[docType] || t.default || '';
}

// 사용자가 직접 수정한 제목이 있으면 그 값을, 없으면 기본 라벨을 반환
function getTitle(id, defaultLabel, docType) {
  if (state.titles[id]) return state.titles[id];
  return typeof defaultLabel === 'string' ? defaultLabel : pickTitle(defaultLabel, docType);
}

function getData() {
  return { values: { ...state.values }, enabled: { ...state.enabled }, titles: { ...state.titles } };
}

function setData(data) {
  if (!data) return;
  if (data.values) state.values = { ...data.values };
  if (data.enabled) state.enabled = { ...state.enabled, ...data.enabled };
  if (data.titles) state.titles = { ...data.titles };
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
}

function escapeHTML(s) {
  return (s || '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  })[c]);
}

function listFromText(text) {
  const lines = (text || '').split('\n').map(l => l.trim()).filter(Boolean);
  if (lines.length === 0) return '';
  return '<ul>' + lines.map(l => `<li>${escapeHTML(l)}</li>`).join('') + '</ul>';
}

function emptyOr(html, placeholder) {
  return html || `<p class="empty">${placeholder}</p>`;
}

// 입력값 갱신
function onInput(id, val) {
  state.values[id] = val;
  saveAndRenderDoc();
}

function toggleSection(id, on) {
  state.enabled[id] = on;
  saveAndRender();
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(getData()));
}

function saveAndRenderDoc() {
  saveState();
  renderDoc();
}

function saveAndRender() {
  saveState();
  renderForm();
  renderDoc();
}

// ----- 폼 패널 -----
function fieldHTML(f, docType) {
  const v = state.values[f.id] || '';
  const label = pickTitle(f.label, docType);
  const ph = f.placeholder ? ` placeholder="${escapeHTML(f.placeholder)}"` : '';
  const onIn = ` oninput="onInput('${f.id}', this.value)"`;
  if (f.type === 'textarea') {
    return `<label>${escapeHTML(label)}</label>
      <textarea id="form-${f.id}"${onIn}${ph}>${escapeHTML(v)}</textarea>`;
  }
  return `<label>${escapeHTML(label)}</label>
    <input id="form-${f.id}"${onIn}${ph} value="${escapeHTML(v)}" />`;
}

function sectionCardHTML(s, docType) {
  const enabled = state.enabled[s.id];
  const fallback = pickTitle(s.title, docType);
  const title = getTitle(s.id, s.title, docType);
  let body = '';
  if (s.children) {
    body = s.children.map(c => fieldHTML(c, docType)).join('');
  } else if (s.single) {
    body = fieldHTML({ ...s.single, label: '내용' }, docType);
  } else if (s.table) {
    body = s.table.map(f => fieldHTML(f, docType)).join('');
  }
  return `
    <div class="section-card ${enabled ? '' : 'disabled collapsed'}">
      <div class="section-card-head">
        <span class="section-card-title" data-card-id="${s.id}" data-fallback="${escapeHTML(fallback)}" contenteditable="true">${escapeHTML(title)}</span>
        <div class="section-card-actions">
          ${enabled
            ? `<button class="mini-btn danger" onclick="toggleSection('${s.id}', false)">제외</button>`
            : `<button class="mini-btn" onclick="toggleSection('${s.id}', true)">추가</button>`}
        </div>
      </div>
      ${enabled ? `<div class="section-card-body">${body}</div>` : ''}
    </div>
  `;
}

function renderForm() {
  const docType = state.values.docType || '제안서';
  // 활성화된 섹션 카드
  $('sectionsHost').innerHTML = SCHEMA
    .filter(s => state.enabled[s.id])
    .map(s => sectionCardHTML(s, docType))
    .join('');
  // 제외된 섹션 칩
  $('excludedHost').innerHTML = SCHEMA
    .filter(s => !state.enabled[s.id])
    .map(s => `<button class="chip-add" onclick="toggleSection('${s.id}', true)">+ ${escapeHTML(pickTitle(s.title, docType))}</button>`)
    .join('');
}

// 편집 가능한 리스트/단문 HTML 생성 (data-list / data-bind 부착)
function editableListHTML(id, val) {
  if (val) {
    const items = val.split('\n').map(l => l.trim()).filter(Boolean);
    return `<ul data-list="${id}" contenteditable="true" class="ed-list">${items.map(l => `<li>${escapeHTML(l)}</li>`).join('')}</ul>`;
  }
  return `<ul data-list="${id}" contenteditable="true" class="ed-list ed-empty"><li></li></ul>`;
}
function editableTextHTML(id, val, tag = 'p') {
  const safe = escapeHTML(val);
  const cls = val ? 'ed-text' : 'ed-text ed-empty';
  return `<${tag} data-bind="${id}" contenteditable="true" class="${cls}">${safe}</${tag}>`;
}

// ----- 문서 미리보기 -----
function sectionDocHTML(s, num, docType) {
  const v = state.values;
  const title = getTitle(s.id, s.title, docType);
  let inner = '';
  if (s.children) {
    inner = s.children.map((c, i) => {
      const sub = getTitle(c.id, c.label, docType);
      const val = v[c.id] || '';
      const body = c.type === 'textarea'
        ? editableListHTML(c.id, val)
        : editableTextHTML(c.id, val);
      return `<h3 class="sub-h"><span class="num">${num}-${i+1})</span> <span data-title="${c.id}" contenteditable="true">${escapeHTML(sub)}</span></h3>${body}`;
    }).join('');
  } else if (s.single) {
    inner = editableListHTML(s.single.id, v[s.single.id] || '');
  } else if (s.table) {
    const rows = s.table.map(f => {
      const val = v[f.id] || '';
      const thLabel = getTitle('th_' + f.id, f.label);
      const cell = f.type === 'textarea'
        ? editableListHTML(f.id, val)
        : `<span data-bind="${f.id}" contenteditable="true" class="${val ? 'ed-text' : 'ed-text ed-empty'}">${escapeHTML(val)}</span>`;
      return `<tr><th><span data-title="th_${f.id}" contenteditable="true">${escapeHTML(thLabel)}</span></th><td>${cell}</td></tr>`;
    }).join('');
    inner = `<table>${rows}</table>`;
  }
  return `<h2><span class="num">${num}.</span> <span data-title="${s.id}" contenteditable="true">${escapeHTML(title)}</span></h2>${inner}`;
}

function renderDoc() {
  const v = state.values;
  const docType = v.docType || '제안서';

  // 테마 적용
  const theme = localStorage.getItem(THEME_KEY) || 'classic';
  const docEl = $('doc');
  docEl.className = 'doc theme-' + theme;

  const logo = getLogo();
  const logoPos = localStorage.getItem(LOGO_POS_KEY) || 'center';
  const logoSize = localStorage.getItem(LOGO_SIZE_KEY) || 'medium';
  const logoHTML = logo ? `<div class="doc-logo pos-${logoPos} size-${logoSize}"><img src="${logo}" alt="회사 로고" /></div>` : '';

  let html = `
    ${logoHTML}
    <div class="doc-header">
      <div class="doc-type">${escapeHTML(docType)}</div>
      <h1 class="doc-title ${v.title ? '' : 'ed-empty'}" data-bind="title" contenteditable="true">${escapeHTML(v.title || '')}</h1>
      <div class="doc-meta">
        <span><strong>작성자</strong><span class="${v.author ? '' : 'ed-empty'}" data-bind="author" contenteditable="true">${escapeHTML(v.author || '')}</span></span>
        <span><strong>소속</strong><span class="${v.org ? '' : 'ed-empty'}" data-bind="org" contenteditable="true">${escapeHTML(v.org || '')}</span></span>
        ${v.date ? `<span><strong>작성일</strong>${formatDate(v.date)}</span>` : ''}
      </div>
    </div>
  `;

  let n = 1;
  SCHEMA.forEach(s => {
    if (!state.enabled[s.id]) return;
    html += sectionDocHTML(s, n++, docType);
  });

  html += `<div class="doc-footer">
    ${escapeHTML(v.org || '')} ${v.org && v.author ? '·' : ''} ${escapeHTML(v.author || '')}
  </div>`;

  $('doc').innerHTML = html;
}

function render() { renderForm(); renderDoc(); }

// 미리보기 인라인 편집 → state 동기화 (폼 input도 함께 갱신, 단 doc은 재렌더하지 않음)
// ----- 회사 로고 -----
const THEME_KEY = 'proposal-tool-theme';

function onThemeChange() {
  localStorage.setItem(THEME_KEY, $('docTheme').value);
  renderDoc();
}

const LOGO_KEY = 'proposal-tool-logo';
const LOGO_POS_KEY = 'proposal-tool-logo-pos';
const LOGO_SIZE_KEY = 'proposal-tool-logo-size';

function getLogo() { return localStorage.getItem(LOGO_KEY) || ''; }

function refreshLogoPreview() {
  const el = $('logoPreview');
  const logo = getLogo();
  if (logo) {
    el.classList.remove('empty');
    el.innerHTML = `<img src="${logo}" alt="logo" />`;
  } else {
    el.classList.add('empty');
    el.textContent = '로고 없음';
  }
}

function onLogoUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) {
    alert('로고 파일은 2MB 이하여야 합니다.');
    return;
  }
  const reader = new FileReader();
  reader.onload = (evt) => {
    try {
      localStorage.setItem(LOGO_KEY, evt.target.result);
    } catch (err) {
      alert('로고 저장 실패: ' + err.message);
      return;
    }
    refreshLogoPreview();
    renderDoc();
  };
  reader.readAsDataURL(file);
  // 같은 파일 재선택 가능하도록 초기화
  e.target.value = '';
}

function removeLogo() {
  if (!getLogo()) return;
  if (!confirm('로고를 제거하시겠습니까?')) return;
  localStorage.removeItem(LOGO_KEY);
  refreshLogoPreview();
  renderDoc();
}

function onLogoOptionChange() {
  localStorage.setItem(LOGO_POS_KEY, $('logoPosition').value);
  localStorage.setItem(LOGO_SIZE_KEY, $('logoSize').value);
  renderDoc();
}

// 폼 카드 제목 편집 → state.titles 동기화 + 미리보기 헤딩에도 즉시 반영
function bindFormTitleEditing() {
  const host = $('sectionsHost');
  if (!host || host._titleBound) return;
  host._titleBound = true;
  host.addEventListener('input', (e) => {
    const target = e.target.closest('.section-card-title[data-card-id]');
    if (!target) return;
    const id = target.dataset.cardId;
    const t = target.innerText.trim();
    if (t) state.titles[id] = t; else delete state.titles[id];
    saveState();
    // 오른쪽 미리보기의 같은 섹션 제목도 동기화
    const docTitle = document.querySelector(`#doc [data-title="${id}"]`);
    if (docTitle) docTitle.textContent = t || target.dataset.fallback || '';
  });
  // Enter로 줄바꿈되지 않도록 막기 (제목은 한 줄)
  host.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && e.target.matches('.section-card-title')) {
      e.preventDefault();
      e.target.blur();
    }
  });
}

function bindDocEditing() {
  const doc = $('doc');
  if (!doc || doc._editBound) return;
  doc._editBound = true;
  doc.addEventListener('input', (e) => {
    const target = e.target.closest('[data-bind], [data-list], [data-title]');
    if (!target) return;
    const bindId = target.dataset.bind;
    const listId = target.dataset.list;
    const titleId = target.dataset.title;
    if (titleId) {
      const t = target.innerText.trim();
      if (t) state.titles[titleId] = t; else delete state.titles[titleId];
      saveState();
      // 왼쪽 폼 카드 헤더 텍스트도 즉시 동기화
      const cardTitle = document.querySelector(`.section-card [data-card-id="${titleId}"]`);
      if (cardTitle) cardTitle.textContent = t || cardTitle.dataset.fallback || cardTitle.textContent;
      return;
    }
    let id, val;
    if (bindId) {
      id = bindId;
      val = target.innerText.replace(/ /g, ' ').trim();
    } else {
      id = listId;
      const items = [...target.querySelectorAll('li')]
        .map(li => li.innerText.replace(/ /g, ' ').trim())
        .filter(Boolean);
      val = items.join('\n');
    }
    state.values[id] = val;
    target.classList.toggle('ed-empty', !val);
    saveState();
    // 왼쪽 폼 input도 함께 갱신 (폼 재렌더 X)
    const formEl = document.getElementById(`form-${id}`);
    if (formEl && formEl.value !== val) formEl.value = val;
  });
  // 빈 칸을 클릭해 입력 시작할 수 있도록 placeholder 제거
  doc.addEventListener('focusin', (e) => {
    const t = e.target.closest('.ed-empty');
    if (t) t.classList.remove('ed-empty');
  });
}

// 헤더 인풋 -> state 동기화
function bindHeader() {
  HEADER_FIELDS.forEach(id => {
    const el = $(id);
    if (!el) return;
    el.value = state.values[id] || '';
    // docType은 라벨(제안/기획)이 바뀌므로 폼까지 재렌더, 그 외엔 미리보기만
    const handler = () => {
      state.values[id] = el.value;
      if (id === 'docType') saveAndRender(); else saveAndRenderDoc();
    };
    el.oninput = handler;
    el.onchange = handler;
  });
}

function resetForm() {
  if (!confirm('모든 입력을 초기화하시겠습니까?')) return;
  state.values = {};
  state.enabled = Object.fromEntries(SCHEMA.map(s => [s.id, s.id !== 'etc']));
  state.titles = {};
  localStorage.removeItem(STORAGE_KEY);
  bindHeader();
  saveAndRender();
}

function loadSample() {
  state.values = {
    docType: '제안서',
    title: '스마트시티 통합관제 플랫폼 구축 제안',
    author: '김제안',
    org: '솔루션사업본부',
    date: new Date().toISOString().slice(0,10),
    ov_purpose: '도시 인프라(CCTV, 교통, 환경)를 단일 플랫폼에서 통합 관제하여\n시민 안전과 행정 효율을 동시에 향상시킴.',

// ----- PowerPoint(.pptx) 내보내기 -----
function exportPPT() {
  if (typeof PptxGenJS === 'undefined') {
    alert('PPT 라이브러리 로딩 중입니다. 잠시 후 다시 시도해주세요.');
    return;
  }
  const v = state.values;
  const docType = v.docType || '제안서';
  const title = v.title || docType;
  const pptx = new PptxGenJS();
  pptx.layout = 'LAYOUT_WIDE';  // 13.33 x 7.5 in
  pptx.title = title;
  pptx.author = v.author || '';
  pptx.company = v.org || '';

  const c = themePalette();
  const PRIMARY = c.primary;
  const DARK = c.dark;
  const ACCENT = c.accent;
  const TEXT = '222222';
  const MUTED = '666666';

  const themeName = currentTheme();
  // 표지 슬라이드
  const cover = pptx.addSlide();
  const logo = getLogo();
  const metaParts = [];
  if (v.author) metaParts.push(`작성자: ${v.author}`);
  if (v.org) metaParts.push(`소속: ${v.org}`);
  if (v.date) metaParts.push(`작성일: ${formatDate(v.date)}`);

  if (themeName === 'modern') {
    // 다크 네이비 + 베이지 좌측 스트립
    cover.background = { color: '1D2733' };
    cover.addShape(pptx.ShapeType.rect, { x: 0, y: 0, w: 0.8, h: 7.5, fill: { color: 'C2A577' } });
    if (logo) cover.addImage({ data: logo, x: 1.2, y: 0.5, w: 2.0, h: 1.0, sizing: { type: 'contain', w: 2.0, h: 1.0 } });
    cover.addText(docType, { x: 1.2, y: 2.0, w: 11.5, h: 0.4, align: 'left', fontSize: 14, color: 'C2A577', bold: true, charSpacing: 8 });
    cover.addText(title, { x: 1.2, y: 2.5, w: 11.5, h: 2.0, align: 'left', fontSize: 48, color: 'FFFFFF', bold: true });
    if (metaParts.length) {
      cover.addText(metaParts.join('   ·   '), { x: 1.2, y: 5.2, w: 11.5, h: 0.5, align: 'left', fontSize: 13, color: 'C2A577', charSpacing: 2 });
    }
  } else if (themeName === 'minimal') {
    cover.background = { color: 'FFFFFF' };
    if (logo) cover.addImage({ data: logo, x: 0.8, y: 0.7, w: 2.0, h: 1.0, sizing: { type: 'contain', w: 2.0, h: 1.0 } });
    cover.addText(docType, { x: 0.8, y: 2.4, w: 11.5, h: 0.4, align: 'left', fontSize: 13, color: '888888', charSpacing: 6 });
    cover.addText(title, { x: 0.8, y: 2.9, w: 11.5, h: 1.8, align: 'left', fontSize: 38, color: '1A1A1A' });
    cover.addShape(pptx.ShapeType.line, { x: 0.8, y: 4.9, w: 1.5, h: 0, line: { color: '1A1A1A', width: 1.5 } });
    if (metaParts.length) {
      cover.addText(metaParts.join('   ·   '), { x: 0.8, y: 5.2, w: 11.5, h: 0.5, align: 'left', fontSize: 13, color: '777777' });
    }
  } else {
    cover.background = { color: 'FFFFFF' };
    if (logo) cover.addImage({ data: logo, x: 5.66, y: 0.6, w: 2.0, h: 1.0, sizing: { type: 'contain', w: 2.0, h: 1.0 } });
    cover.addText(docType, { x: 0.5, y: 2.0, w: 12.33, h: 0.5, align: 'center', fontSize: 18, color: PRIMARY, bold: true, charSpacing: 8 });
    cover.addText(title, { x: 0.5, y: 2.7, w: 12.33, h: 1.6, align: 'center', fontSize: 40, color: TEXT, bold: true });
    if (metaParts.length) {
      cover.addText(metaParts.join('   ·   '), { x: 0.5, y: 5.0, w: 12.33, h: 0.5, align: 'center', fontSize: 16, color: MUTED });
    }
  }

  // 섹션별 슬라이드
  let n = 0;
  SCHEMA.forEach(s => {
    if (!state.enabled[s.id]) return;
    n++;
    const slide = pptx.addSlide();
    slide.background = { color: 'FFFFFF' };
    const sectionTitle = `${n}. ${getTitle(s.id, s.title, docType)}`;
    // 상단 헤더 바
    slide.addShape(pptx.ShapeType.rect, { x: 0, y: 0, w: 13.33, h: 0.7, fill: { color: PRIMARY } });
    slide.addText(sectionTitle, { x: 0.4, y: 0.05, w: 12.5, h: 0.6, fontSize: 22, color: 'FFFFFF', bold: true });

    let bodyY = 1.0;
    if (s.children) {
      s.children.forEach((c, i) => {
        const subTitle = `${n}-${i+1}) ${getTitle(c.id, c.label, docType)}`;
        const val = v[c.id] || '';
        slide.addText(subTitle, { x: 0.5, y: bodyY, w: 12.33, h: 0.4, fontSize: 16, color: DARK, bold: true });
        bodyY += 0.45;
        const lines = val.split('\n').map(l => l.trim()).filter(Boolean);
        if (lines.length) {
          const items = lines.map(l => ({ text: l, options: { bullet: c.type === 'textarea' ? { code: '25CF' } : false } }));
          const h = Math.min(0.35 * lines.length, 1.5);
          slide.addText(items, { x: 0.7, y: bodyY, w: 12.0, h: h, fontSize: 14, color: TEXT, valign: 'top' });
          bodyY += h + 0.1;
        } else {
          bodyY += 0.2;
        }
      });
    } else if (s.single) {
      const val = v[s.single.id] || '';
      const lines = val.split('\n').map(l => l.trim()).filter(Boolean);
      if (lines.length) {
        const items = lines.map(l => ({ text: l, options: { bullet: { code: '25CF' } } }));
        slide.addText(items, { x: 0.7, y: bodyY, w: 12.0, h: 5.5, fontSize: 16, color: TEXT, valign: 'top' });
      }
    } else if (s.table) {
      const rows = s.table.map(f => {
        const val = v[f.id] || '';
        const thLabel = getTitle('th_' + f.id, f.label);
        return [
          { text: thLabel, options: { bold: true, fill: { color: 'EEF3FB' }, color: DARK, valign: 'middle' } },
          { text: val || '-', options: { color: TEXT, valign: 'middle' } }
        ];
      });
      slide.addTable(rows, {
        x: 0.5, y: bodyY, w: 12.33,
        colW: [3.0, 9.33],
        fontSize: 13,
        border: { type: 'solid', pt: 0.5, color: 'D0D4DC' }
      });
    }
  });

  pptx.writeFile({ fileName: `${title}.pptx` });
}

function importJSON(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (evt) => {
    try {
      setData(JSON.parse(evt.target.result));
      bindHeader();
      saveAndRender();
    } catch {
      alert('파일을 읽을 수 없습니다.');
    }
  };
  reader.readAsText(file);
}

// ----- Gemini AI 자동 작성 -----
const AI_KEY_STORAGE = 'proposal-tool-ai-key';
const AI_MODEL_STORAGE = 'proposal-tool-ai-model';

function aiSetStatus(msg, type) {
  const el = $('aiStatus');
  el.className = 'ai-status' + (type ? ' ' + type : '');
  el.textContent = msg || '';
}

// 활성 섹션의 모든 필드를 평탄화하여 스펙 목록 생성
function aiFieldSpec(docType) {
  const specs = [];
  SCHEMA.forEach(s => {
    if (!state.enabled[s.id]) return;
    // 사용자가 수정한 제목이 있으면 그것을 우선 사용
    const stitle = getTitle(s.id, s.title, docType);
    if (s.children) {
      s.children.forEach(c => specs.push({
        id: c.id, label: `${stitle} > ${getTitle(c.id, c.label, docType)}`,
        kind: c.type === 'textarea' ? 'list' : 'short'
      }));
    } else if (s.single) {
      specs.push({ id: s.single.id, label: stitle, kind: 'list' });
    } else if (s.table) {
      s.table.forEach(f => specs.push({
        id: f.id, label: `${stitle} > ${getTitle('th_' + f.id, f.label)}`,
        kind: f.type === 'textarea' ? 'list' : 'short'
      }));
    }
  });
  return specs;
}

function buildAIPrompt(keywords, docType, scope) {
  const specs = aiFieldSpec(docType);
  const existing = {};
  specs.forEach(sp => { if (state.values[sp.id]) existing[sp.id] = state.values[sp.id]; });
  const fillTarget = scope === 'all'
    ? specs
    : specs.filter(sp => !state.values[sp.id]);

  const fieldList = fillTarget.map(sp =>
    `- "${sp.id}" (${sp.kind === 'list' ? '여러 줄, 각 줄은 한 항목' : '한 줄 짧게'}): ${sp.label}`
  ).join('\n');

  return `당신은 한국어 ${docType} 작성 전문가입니다. 아래 주제·키워드를 바탕으로 ${docType}의 각 항목을 한국어로 자연스럽게 작성하세요.

[주제·키워드]
${keywords}

[문서 유형] ${docType}

[기존 입력값(참고하여 일관성 유지)]
${Object.keys(existing).length ? JSON.stringify(existing, null, 2) : '(없음)'}

[작성해야 할 항목]
${fieldList}

[작성 규칙]
- "list" 항목은 줄바꿈(\\n)으로 구분된 3~6개의 짧은 문장(각 줄 한 항목)
- "short" 항목은 한두 줄의 간결한 표현
- 과장 금지, 사실 기반 추정. 구체 숫자가 필요하면 합리적 추정치 사용
- 회사명/금액 등 키워드에 명시된 값은 그대로 사용
- 결과는 반드시 JSON 객체로만 반환 (키 = 항목 id, 값 = 문자열). 다른 텍스트 금지`;
}

async function callGemini(apiKey, model, prompt) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(model)}:generateContent?key=${encodeURIComponent(apiKey)}`;
  const body = {
    contents: [{ parts: [{ text: prompt }] }],
    generationConfig: {
      responseMimeType: 'application/json',
      temperature: 0.7
    }
  };
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) {
    const errTxt = await res.text();
    throw new Error(`HTTP ${res.status}: ${errTxt.slice(0, 300)}`);
  }
  const data = await res.json();
  const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
  if (!text) throw new Error('응답이 비어 있습니다.');
  // JSON 파싱 (코드펜스 제거)
  const cleaned = text.trim().replace(/^```json\s*/i, '').replace(/^```\s*/, '').replace(/```\s*$/, '');
  try {
    return JSON.parse(cleaned);
  } catch {
    throw new Error('JSON 파싱 실패: ' + text.slice(0, 200));
  }
}

async function runAI() {
  const apiKey = $('aiApiKey').value.trim();
  const model = $('aiModel').value;
  const keywords = $('aiKeywords').value.trim();
  const scope = $('aiScope').value;
  const btn = $('aiRunBtn');

  if (!apiKey) { aiSetStatus('API 키를 입력하세요.', 'error'); return; }
  if (!keywords) { aiSetStatus('주제·키워드를 입력하세요.', 'error'); return; }

  localStorage.setItem(AI_KEY_STORAGE, apiKey);
  localStorage.setItem(AI_MODEL_STORAGE, model);

  const docType = state.values.docType || '제안서';
  const prompt = buildAIPrompt(keywords, docType, scope);

  btn.disabled = true;
  aiSetStatus('Gemini 호출 중... (수 초 소요)', 'loading');
  try {
    const result = await callGemini(apiKey, model, prompt);
    let count = 0;
    Object.entries(result).forEach(([k, v]) => {
      if (typeof v !== 'string') return;
      if (scope === 'empty' && state.values[k]) return;
      state.values[k] = v;
      count++;
    });
    saveAndRender();
    aiSetStatus(`${count}개 항목이 작성되었습니다.`, 'success');
  } catch (e) {
    aiSetStatus('실패: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
  }
}

  }
  if (!state.values.date) state.values.date = new Date().toISOString().slice(0, 10);
  if (!state.values.docType) state.values.docType = '제안서';
  bindHeader();
  // AI 패널 복원
  const savedKey = localStorage.getItem(AI_KEY_STORAGE);
  const savedModel = localStorage.getItem(AI_MODEL_STORAGE);
  if (savedKey) $('aiApiKey').value = savedKey;
  if (savedModel) $('aiModel').value = savedModel;
  // 로고 복원
  const savedPos = localStorage.getItem(LOGO_POS_KEY);
  const savedSize = localStorage.getItem(LOGO_SIZE_KEY);
  if (savedPos) $('logoPosition').value = savedPos;
  if (savedSize) $('logoSize').value = savedSize;
  // 테마 복원
  const savedTheme = localStorage.getItem(THEME_KEY);
  if (savedTheme) $('docTheme').value = savedTheme;
  refreshLogoPreview();
  bindDocEditing();
  bindFormTitleEditing();
  saveAndRender();
});
</script>
</body>
</html>
